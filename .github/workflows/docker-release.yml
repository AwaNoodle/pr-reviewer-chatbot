name: Docker Release

on:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker tags
        id: version
        shell: bash
        run: |
          set -euo pipefail

          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          last_semver_tag="$(git describe --tags --abbrev=0 --match 'v[0-9]*.[0-9]*.[0-9]*' 2>/dev/null || true)"

          if [ -n "$last_semver_tag" ]; then
            distance="$(git rev-list "${last_semver_tag}..HEAD" --count)"
            base_tag="$last_semver_tag"
          else
            distance="$(git rev-list HEAD --count)"
            base_tag="v0.0.0"
          fi

          version_tag="${base_tag}-${distance}"
          sha_tag="sha-${GITHUB_SHA::7}"

          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "version_tag=$version_tag" >> "$GITHUB_OUTPUT"
          echo "sha_tag=$sha_tag" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.version.outputs.image }}:${{ steps.version.outputs.version_tag }}
            ${{ steps.version.outputs.image }}:${{ steps.version.outputs.sha_tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version_tag }}

      - name: Print pull commands
        shell: bash
        run: |
          set -euo pipefail

          image="${{ steps.version.outputs.image }}"
          version_tag="${{ steps.version.outputs.version_tag }}"
          sha_tag="${{ steps.version.outputs.sha_tag }}"

          echo "Published Docker image tags:"
          echo "- ${image}:${version_tag}"
          echo "- ${image}:${sha_tag}"
          echo
          echo "Pull commands:"
          echo "docker pull ${image}:${version_tag}"
          echo "docker pull ${image}:${sha_tag}"

          {
            echo "## Docker image published"
            echo
            echo "\`\`\`bash"
            echo "docker pull ${image}:${version_tag}"
            echo "docker pull ${image}:${sha_tag}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
